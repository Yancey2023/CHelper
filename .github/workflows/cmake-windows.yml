name: cmake-windows

on:
  push:
    branches: [ "master", "dev" ]
    paths:
      - '.github/workflows/cmake-windows.yml'
      - 'CHelper-Core/**'
  pull_request:
    branches: [ "master", "dev" ]
    paths:
      - '.github/workflows/cmake-windows.yml'
      - 'CHelper-Core/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        build_type: [ Release, Debug ]
        c_compiler: [ cl ]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'

      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}/CHelper-Core

      - name: Build Test
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target CHelperTest

      - name: Run Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: .\${{ matrix.build_type }}\CHelperTest.exe

      - name: Build Resource Generator
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target CHelperResourceGenerator

      - name: Run Resource Generator
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: .\${{ matrix.build_type }}\CHelperResourceGenerator.exe

      - name: Build CHelperQt
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target CHelperQt
