name: Build CHelper-Web

on:
  push:
    branches: [ "master", "dev" ]
    paths:
      - '.github/workflows/build-web.yml'
      - 'CHelper-Web/**'
  pull_request:
    branches: [ "master", "dev" ]
    paths:
      - '.github/workflows/build-web.yml'
      - 'CHelper-Web/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        working-directory: ${{ github.workspace }}/CHelper-Web
        run: npx vite build --base=/${{ github.event.repository.name }}/ --mode production
